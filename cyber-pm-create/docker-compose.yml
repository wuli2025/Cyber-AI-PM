version: '3.8'

services:
  app:
    build: ./backend
    container_name: ai-product-lab
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.minimax.chat/v1}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-MiniMax-M2.7-highspeed}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FRONTEND_PATH=/app/frontend
    volumes:
      - ./data:/app/data
      - ./Kimi_Agent_Deployment_v11:/app/frontend:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 可选：Nginx反向代理（处理HTTPS和静态资源）
  nginx:
    image: nginx:alpine
    container_name: ai-product-lab-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # 可选：SSL证书
    depends_on:
      - app
